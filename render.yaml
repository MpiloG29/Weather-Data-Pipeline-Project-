services:
  - type: web
    name: weather-pipeline
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    healthCheckPath: /status
    envVars:
      - key: DATABASE_URL
        value: sqlite:///data/weather_data.db
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: weather-data
      mountPath: /app/data
      sizeGB: 1